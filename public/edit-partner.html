<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактирование партнёра</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <button class="btn-back" id="backBtn">← Назад</button>
            <h1 id="form-title">Добавление партнёра</h1>
        </header>

        <main>
            <form id="partner-form" class="partner-form">
                <div class="form-group">
                    <label for="name">Наименование *</label>
                    <input type="text" id="name" required>
                </div>

                <div class="form-group">
                    <label for="partner_type_id">Тип партнёра *</label>
                    <select id="partner_type_id" required>
                        <option value="">-- выберите тип --</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="rating">Рейтинг (целое неотрицательное) *</label>
                    <input type="number" id="rating" min="0" step="1" value="0" required>
                </div>

                <div class="form-group">
                    <label for="address">Адрес *</label>
                    <input type="text" id="address" required>
                </div>

                <div class="form-group">
                    <label for="director_name">ФИО директора *</label>
                    <input type="text" id="director_name" required>
                </div>

                <div class="form-group">
                    <label for="phone">Телефон *</label>
                    <input type="tel" id="phone" placeholder="+7 (123) 456-78-90" required>
                </div>

                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" required>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                    <button type="button" class="btn btn-secondary" id="cancelBtn">Отмена</button>
                </div>
            </form>
        </main>
    </div>

    <script src="edit-partner.js"></script>
</body>
</html>
